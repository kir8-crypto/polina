<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Полины...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* Канвас для эффекта матрицы */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Контейнер для текста поверх матрицы */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Общие стили для отсчета */
        #countdown {
            font-family: 'Courier New', Courier, monospace;
            font-size: 150px;
            color: #ff1a66; /* Красно-розовый оттенок */
            text-shadow: 0 0 15px #ff1a66;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стиль для "I love you" */
        #message {
            font-family: 'Arial', sans-serif;
            font-size: 60px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff, 0 0 25px #ff1a66;
            display: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            margin: 0;
        }

        /* --- Стили для финального сердца с именем --- */
        #heart-final {
            display: none;
            position: relative;
            justify-content: center;
            align-items: center;
            width: 210px; /* Сделали капельку побольше (было 180) */
            height: 210px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            margin: 0;
            animation: pulse-heart 1.5s infinite;
        }

        /* Идеальное SVG-сердце: красно-розовое с просветом */
        .heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: rgba(255, 20, 90, 0.8); /* Красно-розовый цвет, немного прозрачный */
            filter: blur(4px) drop-shadow(0 0 20px rgba(255, 20, 90, 0.9)); /* Мягкое свечение */
        }

        /* Имя в крутом кастомном неоновом стиле */
        .heart-name {
            position: relative;
            z-index: 4;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 28px;
            font-weight: 900; /* Очень жирный шрифт */
            letter-spacing: 3px; /* Расстояние между буквами для стиля */
            /* Мощный неоновый эффект свечения */
            text-shadow: 
                0 0 5px #fff, 
                0 0 10px #fff, 
                0 0 20px #ff145a, 
                0 0 30px #ff145a, 
                0 0 45px #ff145a;
            transform: translate(0, -3px); /* Чуть-чуть приподняли визуально для идеального центра */
            text-align: center;
            margin: 0;
        }

        /* Анимация пульсации для сердца */
        @keyframes pulse-heart {
            0% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.85; }
        }
    </style>
</head>
<body>

    <!-- Эффект падающих букв -->
    <canvas id="matrix"></canvas>

    <!-- Текст и счетчик -->
    <div class="content">
        <div id="countdown">3</div>
        <div id="message">I love you</div>
        
        <!-- Финальное красно-розовое сердце с именем -->
        <div id="heart-final">
            <svg viewBox="0 0 32 29.6" class="heart-svg">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
            <div class="heart-name">Полина</div>
        </div>
    </div>

    <script>
        // --- Настройка эффекта "Матрицы" ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "v e u   I l o v e y o u   v e u   I l o v e y o u   ";
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff1a66'; /* Цвет матрицы под цвет сердца */
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // --- Настройка логики появления текста ---
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const messageEl = document.getElementById('message');
        const heartFinalEl = document.getElementById('heart-final');

        const timer = setInterval(() => {
            count--;
            
            if (count > 0) {
                countdownEl.innerText = count;
            } else {
                clearInterval(timer);
                countdownEl.style.display = 'none'; 
                
                messageEl.style.display = 'block';
                setTimeout(() => { messageEl.style.opacity = '1'; }, 50);

                setTimeout(() => {
                    messageEl.style.opacity = '0';
                    
                    setTimeout(() => {
                        messageEl.style.display = 'none';

                        heartFinalEl.style.display = 'flex';
                        setTimeout(() => { heartFinalEl.style.opacity = '1'; }, 50);

                    }, 1000); 

                }, 2500); 
            }
        }, 1000);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
